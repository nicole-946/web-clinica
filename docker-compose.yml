services:
  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      WATCHPACK_POLLING: "true"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      api:
        condition: service_healthy
    networks:
      - clinical-net

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://clinical:clinical@postgres:5432/clinical_sim
      REDIS_URL: redis://redis:6379/0
      SYSTEM_PROMPTS_DIR: /app/system_prompts
      EVALUATION_DIR: /app/evaluation
      CORS_ORIGINS: http://localhost:3000
      LLM_PROVIDER: mock
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages:/app/packages
      - ./system_prompts:/app/system_prompts
      - ./evaluation:/app/evaluation
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - clinical-net

  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: clinical
      POSTGRES_PASSWORD: clinical
      POSTGRES_DB: clinical_sim
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clinical -d clinical_sim"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - clinical-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - clinical-net

volumes:
  postgres_data:
  redis_data:

networks:
  clinical-net:
    driver: bridge
